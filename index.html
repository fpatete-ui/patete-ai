<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATETE AI · 2626</title>

<style>

body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* Fondo estrellado */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.05;
    animation: moveStars 200s linear infinite;
    z-index: 0;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-1000px,-1000px); }
}

/* Sección principal */
.hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Logo IMPERFFECTION */
.hero img {
    width: 900px;
    max-width: 90vw;
    filter: drop-shadow(0 0 25px rgba(255,255,255,0.4));
}

/* Statement */
.manifesto {
    margin-top: 50px;
    letter-spacing: 6px;
    font-size: 15px;
    opacity: 0.95;
}

.manifesto span {
    display: block;
    margin-top: 15px;
    font-size: 18px;
    letter-spacing: 12px;
    opacity: 0.75;
}

/* Sección base */
.foundation-section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Logo PATETE AI */
.foundation-section img {
    width: 300px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 1.2s ease;
}

/* Cuando aparece */
.foundation-section.visible img {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<section class="hero">
    <img src="imperfection.png" alt="IMPERFFECTION">
    <div class="manifesto">
        HUMANS EMPOWER AI
        <span>2626</span>
    </div>
</section>

<section class="foundation-section" id="foundation">
    <img src="pateteai.png" alt="PATETE AI">
</section>

<script>

/* Detectar scroll */
const foundation = document.getElementById("foundation");

window.addEventListener("scroll", () => {
    const rect = foundation.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
        foundation.classList.add("visible");
    }
});

</script>

</body>
</html>
