<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PATETE AI · Vision 2626</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* Fondo estrellado */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('fondo.jpg') no-repeat center center;
    background-size: cover;
    z-index: -3;
}

/* Video energía */
.video-layer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80vw;
    max-width: 900px;
    opacity: 0.85;
    z-index: -2;
    pointer-events: none;
}

/* Logo principal */
.logo {
    position: relative;
    width: 60vw;
    max-width: 700px;
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}

/* Contenedor central */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* Manifiesto */
.manifesto {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.7;
}

/* Universo */
.universe {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.4;
}
</style>
</head>

<body>

<div class="background"></div>

<video class="video-layer" autoplay muted loop playsinline>
    <source src="energy.mp4" type="video/mp4">
</video>

<div class="center">
    <img src="pateteai.png" class="logo">
</div>

<div class="manifesto">
    HUMANS EMPOWER AI
</div>

<div class="universe">
    IMPERFFECTION · Vision 2626
</div>

</body>
</html>
