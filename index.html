<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PATETE AI · Vision 2626</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -2;
  filter: brightness(0.6) contrast(1.1);
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
  z-index: -1;
}

/* CENTER LOGO */
.center {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo {
  width: 60%;
  max-width: 800px;
  animation: breathe 6s ease-in-out infinite;
}

/* subtle breathing effect */
@keyframes breathe {
  0% { transform: scale(1); opacity: 0.95; }
  50% { transform: scale(1.03); opacity: 1; }
  100% { transform: scale(1); opacity: 0.95; }
}

</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="energy.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="center">
  <img src="pateteai.png" class="logo">
</div>

</body>
</html>
