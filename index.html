<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATETE AI · 2626</title>

<style>

body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* Fondo estrellas */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.05;
    animation: stars 200s linear infinite;
    z-index: 0;
}

@keyframes stars {
    from { transform: translate(0,0); }
    to { transform: translate(-1000px,-1000px); }
}

/* HERO */
.hero {
    position: relative;
    z-index: 1;
    height: 150vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* IMPERFFECTION gigante */
.hero img {
    width: 1200px;
    max-width: 95vw;
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 40px rgba(255,255,255,0.6));
    position: sticky;
    top: 10vh;
}

/* Statement */
.manifesto {
    margin-top: 60px;
    letter-spacing: 8px;
    font-size: 16px;
    opacity: 0.95;
}

.manifesto span {
    display: block;
    margin-top: 20px;
    font-size: 22px;
    letter-spacing: 14px;
    opacity: 0.75;
}

/* FOUNDATION */
.foundation {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* PATETE AI */
.foundation img {
    width: 500px;
    max-width: 80vw;
    opacity: 0;
    transform: translateY(60px);
    transition: all 1.5s ease;
    filter: drop-shadow(0 0 30px rgba(0,150,255,0.7))
            drop-shadow(0 0 60px rgba(150,0,255,0.4));
}

/* Visible */
.foundation.visible img {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<section class="hero">
    <img src="imperfection.png" alt="IMPERFFECTION">
    <div class="manifesto">
        HUMANS EMPOWER AI
        <span>2626</span>
    </div>
</section>

<section class="foundation" id="foundation">
    <img src="pateteai.png" alt="PATETE AI">
</section>

<script>

const foundation = document.getElementById("foundation");

window.addEventListener("scroll", () => {
    const rect = foundation.getBoundingClientRect();
    if (rect.top < window.innerHeight - 150) {
        foundation.classList.add("visible");
    }
});

</script>

</body>
</html>
