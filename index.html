<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATETE AI · 2626</title>

<style>

body {
    margin: 0;
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Fondo estrellado sutil */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.05;
    animation: moveStars 180s linear infinite;
    z-index: 0;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-800px,-800px); }
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
}

/* Logo principal */
.container img.main-logo {
    width: 700px;
    max-width: 85vw;
}

/* Manifiesto */
.manifesto {
    margin-top: 40px;
    letter-spacing: 6px;
    font-size: 14px;
    opacity: 0.9;
}

.manifesto span {
    display: block;
    margin-top: 12px;
    font-size: 16px;
    letter-spacing: 10px;
    opacity: 0.7;
}

/* Logo base */
.foundation {
    margin-top: 40px;
}

.foundation img {
    width: 130px;
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="container">

    <img src="imperfection.png" class="main-logo" alt="IMPERFFECTION">

    <div class="manifesto">
        HUMANS EMPOWER AI
        <span>2626</span>
    </div>

    <div class="foundation">
        <img src="pateteai.png" alt="PATETE AI">
    </div>

</div>

</body>
</html>
